name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - 'src/**/CMakeLists.txt'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake git \
            libssl-dev libxxhash-dev \
            libmsgpack-dev nlohmann-json3-dev \
            libspdlog-dev libfmt-dev liblz4-dev
          # crc32c — not in Ubuntu repos, build from source
          cd /tmp && git clone https://github.com/google/crc32c.git
          cd crc32c && git submodule update --init --recursive
          mkdir build && cd build
          cmake .. -DCRC32C_BUILD_TESTS=OFF -DCRC32C_BUILD_BENCHMARKS=OFF \
            -DCMAKE_INSTALL_PREFIX=/usr -DBUILD_SHARED_LIBS=ON
          make -j$(nproc) && sudo make install && sudo ldconfig
      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DAMIND_BUILD_BENCHMARKS=OFF \
            -DAMIND_ENABLE_TLS=ON \
            -DBREW_PREFIX=/usr
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Run tests
        run: cd build && ctest --output-on-failure -j$(nproc)

  lint:
    name: Code Style Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check code style
        run: find src tests -name '*.cpp' -o -name '*.h' | xargs clang-format --dry-run --Werror
